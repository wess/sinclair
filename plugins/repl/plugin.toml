id = "repl"
name = "REPL"
version = "0.1.0"
description = "Open a language REPL in a split to the right"

[[command]]
id = "python"
title = "Python REPL"
run = "python3"
mode = "split-right"

[[command]]
id = "node"
title = "Node REPL"
run = "node"
mode = "split-right"

[[command]]
id = "bun"
title = "Bun REPL"
run = "bun repl"
mode = "split-right"
