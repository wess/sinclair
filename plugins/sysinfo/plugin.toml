id = "sysinfo"
name = "System"
version = "0.1.0"
description = "A live panel with host load and disk, plus a monitor shortcut"
capabilities = ["commands", "filesystem"]

[runtime]
command = "bun run plugin.ts"

[panel]
id = "sysinfo"
title = "System"
icon = "❖"

# A tool the plugin exposes to AI agents over MCP (appears as `sysinfo_stats`
# in `sinclair mcp`). Agents can read host stats without a shell round-trip.
[[tool]]
id = "stats"
description = "Read host system stats: hostname, load averages, and disk usage for the given directory. Returns structured JSON."

[[tool.param]]
name = "cwd"
type = "string"
description = "Directory to report disk usage for (defaults to the process cwd)"
