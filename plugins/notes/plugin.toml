id = "notes"
name = "Notes"
version = "0.1.0"
description = "A lightweight Obsidian: a markdown vault with a file tree and editor, in a tab"

# The runtime is a one-shot launcher: on the page's boot handshake it makes sure
# the persistent local server is running and hands back its port. See readme.md.
[runtime]
command = "bun run runtime/launcher.ts"

# The surface is a web view opened as a tab. `boot = true` makes the app invoke
# the runtime's `boot` method first (Rust -> process), which starts the server
# and returns its port; the app then loads the served app at that http origin.
# (A file:// page can't reach native, so we don't load one.)
[webview]
id = "notes"
title = "Notes"
icon = "◆"
placement = "tab"
boot = true
url = "http://127.0.0.1:{port}/"
