id = "serve"
name = "HTTP Serve"
version = "0.1.0"
description = "Serve the current directory over HTTP with Python"

[[command]]
id = "8000"
title = "Serve on :8000"
run = "python3 -m http.server 8000"
mode = "split-right"
keybind = "cmd+ctrl+8"

[[command]]
id = "3000"
title = "Serve on :3000"
run = "python3 -m http.server 3000"
mode = "split-right"
